<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试用例生成器</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>测试用例生成器</h1>

        <form id="requirementsForm">
            <!-- 文本输入 -->
            <div class="input-group">
                <label for="requirementText">需求文本：<span class="char-count" id="charCount">0</span></label>
                <textarea id="requirementText" name="requirementText" rows="8"
                    placeholder="在此输入您的需求文本..."></textarea>
                <div class="validation-hint" id="textHint"></div>
            </div>

            <!-- 图片上传（支持多张） -->
            <div class="input-group">
                <label for="requirementImages">需求图片（可选，支持多张）：</label>
                <input type="file" id="requirementImages" name="requirementImages" accept="image/*" multiple>
                <div class="image-preview" id="imagePreview"></div>
            </div>

            <!-- 高级设置 -->
            <details class="advanced-settings">
                <summary>高级设置</summary>
                <div class="settings-grid">
                    <div class="setting-item">
                        <label for="modelSelect">模型选择：</label>
                        <select id="modelSelect" name="model">
                            <option value="">自动选择</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label for="maxTokens">Max Tokens：</label>
                        <input type="number" id="maxTokens" name="max_tokens" value="8192" min="256" max="16384" step="256">
                    </div>
                    <div class="setting-item">
                        <label for="temperature">Temperature：</label>
                        <input type="range" id="temperature" name="temperature" min="0" max="2" step="0.1" value="0.5">
                        <span id="tempValue">0.5</span>
                    </div>
                    <div class="setting-item">
                        <label for="streamMode">流式输出：</label>
                        <input type="checkbox" id="streamMode" name="stream" checked>
                    </div>
                </div>
            </details>

            <button type="submit" id="submitBtn">生成测试用例</button>
            <button type="button" id="stopBtn" class="btn-secondary" style="display:none">停止生成</button>
        </form>

        <!-- 进度条 -->
        <div id="progressBar" class="progress-bar" style="display:none">
            <div class="progress-bar-fill"></div>
        </div>
        <div id="statusText" class="status-text"></div>

        <!-- 结果区域 -->
        <div class="results-container" id="resultsContainer" style="display:none">
            <div class="results-header">
                <h2>生成的测试用例</h2>
                <div class="results-actions">
                    <span id="usageInfo" class="usage-info"></span>
                    <button id="exportCsvBtn" class="btn-small" title="导出CSV">导出CSV</button>
                    <button id="copyBtn" class="btn-small" title="复制全部">复制</button>
                </div>
            </div>
            <div id="testCasesResult" class="test-cases-display"></div>
        </div>

        <!-- 历史记录 -->
        <details class="history-panel" id="historyPanel">
            <summary>历史记录 (<span id="historyCount">0</span>)</summary>
            <div id="historyList" class="history-list"></div>
        </details>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
